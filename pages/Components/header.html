<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
  <header class="main-header">
    <div class="header-container">
        
        <nav class="header-nav">
            <a data-href="index.html" class="nav-link" id="nav-inicio" data-i18n="nav.inicio">Inicio</a>
            <a data-href="pages/actividades.html" class="nav-link" id="nav-actividades" data-i18n="nav.actividades">Actividades</a>
        </nav>

        <div class="header-auth">

            <button class="btn-idioma" type="button" aria-label="Cambiar idioma / Switch language">EN</button>

            <div id="logged-out-state">
                <button class="btn-iniciar-sesion">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <span data-i18n="nav.iniciarSesion">Iniciar sesión</span>
                </button>
            </div>

            <div id="logged-in-state" class="hidden" style="display: flex; align-items: center; gap: 1.25rem;">
                <a data-href="pages/perfil.html" id="nav-perfil" style="display: flex; align-items: center; gap: 10px; text-decoration: none;">
                    <span class="user-name" style="color: #0f5b46; font-weight: 700; font-family: inherit;"></span>
                    <div class="avatar" style="width: 38px; height: 38px; background-color: #0f5b46; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.85rem;"></div>
                </a>
            </div>

        </div>
    </div>
</header>
    
</body>
</html>
