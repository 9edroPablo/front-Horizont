<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon - Actividades</title>
    
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components/header.css">
    <link rel="stylesheet" href="../css/components/rutaCard.css">
    
    <!-- 1. AÑADIDO: CSS del Modal de Autenticación -->
    <link rel="stylesheet" href="../css/components/authModal.css">
    <link rel="stylesheet" href="../css/components/footer.css">
    <link rel="stylesheet" href="../css/responsive.css">
    
    <!-- Estilos específicos para esta página -->
    <style>
        .actividades-container {
            max-width: 1200px;
            margin: 120px auto 60px; /* Margen superior para no chocar con el nav */
            padding: 0 20px;
        }
        .actividades-header {
            margin-bottom: 40px;
        }
        .actividades-header h1 {
            font-size: 32px;
            color: #1F2937;
            margin-bottom: 10px;
        }
        .actividades-header p {
            color: #6B7280;
            margin-bottom: 20px;
        }
        .buscador-wrap {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        .buscador-wrap input {
            flex-grow: 1;
            padding: 12px 20px;
            border: 1px solid #D1D5DB;
            border-radius: 10px;
            font-size: 16px;
        }
        .grid-actividades {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .panel-filtros {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            background: #F9FAFB;
            border: 1px solid #E5E7EB;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .panel-filtros-grupo h4 {
            font-size: 12px;
            letter-spacing: 0.05em;
            color: #6B7280;
            margin-bottom: 12px;
        }

        .panel-filtros-grupo label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #374151;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .grupo-dificultad {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-dif-actividades {
            padding: 6px 14px;
            border: 1px solid #D1D5DB;
            border-radius: 999px;
            background: #FFFFFF;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            cursor: pointer;
        }

        .btn-dif-actividades.active {
            background: #0f5b46;
            border-color: #0f5b46;
            color: #FFFFFF;
        }
    </style>
</head>
<body>
    <!-- Se inyectará el Header aquí -->
    <div id="componente-header"></div>
    
    <main class="actividades-container">
        <div class="actividades-header">
            <h1 data-i18n="actividades.titulo">Explorar Rutas</h1>
            <p data-i18n="actividades.descripcion">9 aventuras verificadas. Filtra por deporte, dificultad o destino y encuentra tu próxima ruta.</p>

            <div class="buscador-wrap">
                <input type="text" id="input-buscar" placeholder="Buscar por nombre o destino..." data-i18n-placeholder="actividades.buscar.placeholder">
            </div>

            <div class="panel-filtros" id="panel-filtros">
                <div class="panel-filtros-grupo">
                    <h4 data-i18n="actividades.deporte">DEPORTE</h4>
                    <label><input type="checkbox" class="chk-deporte" value="Senderismo" checked> <span data-i18n="deporte.senderismo">Senderismo</span></label>
                    <label><input type="checkbox" class="chk-deporte" value="Kayak" checked> <span data-i18n="deporte.kayak">Kayak</span></label>
                    <label><input type="checkbox" class="chk-deporte" value="Escalada" checked> <span data-i18n="deporte.escalada">Escalada</span></label>
                    <label><input type="checkbox" class="chk-deporte" value="Pesca" checked> <span data-i18n="deporte.pesca">Pesca</span></label>
                </div>
                <div class="panel-filtros-grupo">
                    <h4 data-i18n="actividades.dificultad">DIFICULTAD</h4>
                    <div class="grupo-dificultad">
                        <button class="btn-dif-actividades active" data-dificultad="todos" data-i18n="mapa.dif.todos">Todos</button>
                        <button class="btn-dif-actividades" data-dificultad="facil" data-i18n="mapa.dif.facil">Fácil</button>
                        <button class="btn-dif-actividades" data-dificultad="medio" data-i18n="mapa.dif.medio">Medio</button>
                        <button class="btn-dif-actividades" data-dificultad="dificil" data-i18n="mapa.dif.dificil">Difícil</button>
                    </div>
                </div>
            </div>

            <p style="font-weight: 600; color: #374151;" id="contador-rutas">9 rutas encontradas</p>
        </div>

        <!-- Aquí inyectamos el componente reciclado -->
        <div id="grid-todas-rutas" class="rutas-grid"></div>
    </main>

    <div id="componente-footer"></div>

    <!-- 2. AÑADIDO: Contenedor vacío para el Modal -->
    <div id="componente-auth-modal"></div>

    <script type="module" src="../js/i18n.js"></script>

    <!-- Script de Header -->
    <script type="module" src="../js/components/loadHeader.js"></script>
    <script type="module" src="../js/components/loadFooter.js"></script>

    <!-- 3. AÑADIDO: Script que inyecta la lógica del Modal -->
    <script type="module" src="../js/components/loadAuthModal.js"></script>
    
    <!-- Script de esta página específica -->
    <script type="module" src="../js/actividades.js"></script>
</body>
</html>
