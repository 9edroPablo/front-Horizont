<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon - Mi Perfil</title>
    
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components/header.css">
    <link rel="stylesheet" href="../css/perfil.css">
</head>
<body style="background-color: #f9fafb; margin: 0;">

    <div id="componente-header"></div>

    <main class="perfil-container">
        <div class="perfil-card">
            
            <div id="card-avatar" class="perfil-avatar">--</div>
            <h2 id="card-nombre" class="perfil-nombre">Cargando...</h2>
            <p id="card-email" class="perfil-email">cargando@correo.com</p>

            <button id="btn-cerrar-sesion" class="btn-logout">
                Cerrar Sesión
            </button>

        </div>
    </main>

    <script src="../js/components/loadHeader.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const usuarioGuardado = localStorage.getItem('horizon_user');
            
            if (usuarioGuardado) {
                const usuario = JSON.parse(usuarioGuardado);
                document.getElementById('card-nombre').textContent = usuario.name || 'Usuario';
                document.getElementById('card-avatar').textContent = usuario.avatar || 'U';
                document.getElementById('card-email').textContent = usuario.email || 'usuario@horizon.com';
            } else {
                window.location.href = '../index.html';
            }
        });
    </script>

</body>
</html>
